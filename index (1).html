<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BD Boutique</title>
<style>
  /* ─── Tokens ─────────────────────────────────────────────── */
  :root {
    --ink:    #0f0f0f;
    --paper:  #fafaf8;
    --accent: #e85d26;
    --accent2:#fbbf24;
    --muted:  #6b7280;
    --border: #e5e5e0;
    --card:   #ffffff;
    --radius: 14px;
    --shadow: 0 2px 16px rgba(0,0,0,.08);
    --font-display: 'Syne', sans-serif;
    --font-body:    'Inter', sans-serif;
  }

  /* ─── Reset ───────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
  }
  a { text-decoration: none; color: inherit; }
  button { cursor: pointer; border: none; background: none; font: inherit; }
  img { display: block; max-width: 100%; }

  /* ─── Google Fonts ────────────────────────────────────────── */
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap');

  /* ─── Header ──────────────────────────────────────────────── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(250,250,248,.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    display: flex; align-items: center; justify-content: space-between;
    height: 60px;
  }
  .logo {
    font-family: var(--font-display);
    font-size: 1.35rem; font-weight: 800;
    letter-spacing: -0.03em;
  }
  .logo span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 12px; }
  #cart-btn {
    display: flex; align-items: center; gap: 6px;
    background: var(--ink); color: #fff;
    border-radius: 999px; padding: 7px 16px;
    font-size: .85rem; font-weight: 600;
    transition: background .15s;
  }
  #cart-btn:hover { background: var(--accent); }
  #cart-count {
    background: var(--accent2); color: var(--ink);
    border-radius: 999px; min-width: 20px; height: 20px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: .75rem; font-weight: 700; padding: 0 5px;
  }
  #cart-count.hidden { display: none; }

  /* ─── Hero ────────────────────────────────────────────────── */
  .hero {
    padding: 56px 20px 40px;
    max-width: 900px; margin: 0 auto;
    display: flex; flex-direction: column; gap: 12px;
  }
  .hero-eyebrow {
    font-size: .75rem; font-weight: 600; letter-spacing: .1em;
    text-transform: uppercase; color: var(--accent);
  }
  .hero-title {
    font-family: var(--font-display);
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 800; line-height: 1.05;
    letter-spacing: -0.03em;
  }
  .hero-sub {
    color: var(--muted); font-size: 1rem; max-width: 480px;
  }

  /* ─── Search / filter ─────────────────────────────────────── */
  .toolbar {
    max-width: 900px; margin: 0 auto 24px;
    padding: 0 20px;
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  #search-input {
    flex: 1; min-width: 180px;
    border: 1.5px solid var(--border);
    border-radius: 999px; padding: 9px 18px;
    font: inherit; font-size: .9rem;
    background: var(--card);
    outline: none; transition: border-color .15s;
  }
  #search-input:focus { border-color: var(--accent); }
  #cat-filter {
    border: 1.5px solid var(--border); border-radius: 999px;
    padding: 9px 16px; font: inherit; font-size: .9rem;
    background: var(--card); color: var(--ink); outline: none;
    cursor: pointer;
  }

  /* ─── Grid produits ───────────────────────────────────────── */
  .products-section { max-width: 900px; margin: 0 auto; padding: 0 20px 80px; }
  #products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 18px;
  }

  /* ─── Carte produit ───────────────────────────────────────── */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    display: flex; flex-direction: column;
    transition: transform .18s, box-shadow .18s;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(0,0,0,.12); }
  .card-img {
    width: 100%; aspect-ratio: 4/3; object-fit: cover;
    background: #f0ede8;
  }
  .card-img-placeholder {
    width: 100%; aspect-ratio: 4/3;
    background: linear-gradient(135deg,#f0ede8,#e8e2d8);
    display: flex; align-items: center; justify-content: center;
    font-size: 2.5rem; color: #c5bdb3;
  }
  .card-body { padding: 14px 16px 16px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .card-cat {
    font-size: .7rem; font-weight: 600; letter-spacing: .08em;
    text-transform: uppercase; color: var(--accent);
  }
  .card-name {
    font-family: var(--font-display);
    font-size: 1rem; font-weight: 700; line-height: 1.25;
    letter-spacing: -0.01em;
  }
  .card-desc {
    font-size: .82rem; color: var(--muted); line-height: 1.45;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: auto; padding-top: 12px;
  }
  .card-price {
    font-family: var(--font-display);
    font-size: 1.1rem; font-weight: 800; color: var(--ink);
  }
  .card-price small { font-size: .7rem; font-weight: 500; color: var(--muted); font-family: var(--font-body); }
  .btn-add {
    background: var(--ink); color: #fff;
    border-radius: 999px; padding: 7px 14px;
    font-size: .82rem; font-weight: 600;
    transition: background .15s;
  }
  .btn-add:hover { background: var(--accent); }
  .btn-add:disabled { background: #ccc; cursor: not-allowed; }

  /* ─── Stock badge ─────────────────────────────────────────── */
  .stock-badge {
    font-size: .7rem; font-weight: 600; border-radius: 999px;
    padding: 2px 8px; display: inline-block;
  }
  .stock-ok  { background: #dcfce7; color: #15803d; }
  .stock-low { background: #fef9c3; color: #92400e; }
  .stock-out { background: #fee2e2; color: #991b1b; }

  /* ─── États vides / chargement ────────────────────────────── */
  #products-grid.loading,
  #products-grid.empty {
    grid-column: 1/-1; display: flex; align-items: center; justify-content: center;
    min-height: 260px;
  }
  .state-msg {
    text-align: center; color: var(--muted);
    display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  .state-msg .icon { font-size: 2.5rem; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── Panier (drawer) ─────────────────────────────────────── */
  #cart-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.4);
    z-index: 200; opacity: 0; pointer-events: none;
    transition: opacity .25s;
  }
  #cart-overlay.open { opacity: 1; pointer-events: all; }
  #cart-drawer {
    position: fixed; right: 0; top: 0; bottom: 0;
    width: min(420px, 100vw);
    background: var(--card);
    z-index: 201; display: flex; flex-direction: column;
    transform: translateX(100%);
    transition: transform .3s cubic-bezier(.4,0,.2,1);
    box-shadow: -8px 0 32px rgba(0,0,0,.12);
  }
  #cart-drawer.open { transform: translateX(0); }

  .drawer-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .drawer-header h2 {
    font-family: var(--font-display);
    font-size: 1.15rem; font-weight: 800;
  }
  #close-cart {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--border); font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  #close-cart:hover { background: #d1d5db; }

  #cart-items { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
  .cart-empty-msg {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--muted); gap: 8px; text-align: center;
  }
  .cart-empty-msg .icon { font-size: 2.5rem; }

  .cart-line {
    display: flex; align-items: center; gap: 12px;
    padding-bottom: 12px; border-bottom: 1px solid var(--border);
  }
  .cart-line-img {
    width: 56px; height: 56px; border-radius: 10px; object-fit: cover;
    background: #f0ede8; flex-shrink: 0;
  }
  .cart-line-img-ph {
    width: 56px; height: 56px; border-radius: 10px;
    background: linear-gradient(135deg,#f0ede8,#e8e2d8);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem; flex-shrink: 0;
  }
  .cart-line-info { flex: 1; min-width: 0; }
  .cart-line-name { font-weight: 600; font-size: .9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cart-line-price { font-size: .82rem; color: var(--muted); }
  .qty-ctrl { display: flex; align-items: center; gap: 6px; }
  .qty-btn {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--border); font-size: 1rem; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    transition: background .12s;
  }
  .qty-btn:hover { background: #d1d5db; }
  .qty-val { min-width: 20px; text-align: center; font-size: .9rem; font-weight: 600; }
  .cart-line-total { font-weight: 700; font-size: .9rem; white-space: nowrap; }

  .drawer-footer {
    padding: 16px 20px 20px;
    border-top: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 10px;
  }
  .total-row { display: flex; justify-content: space-between; align-items: center; }
  .total-label { font-size: .9rem; color: var(--muted); }
  .total-amount { font-family: var(--font-display); font-size: 1.3rem; font-weight: 800; }

  .btn-wa {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: #25d366; color: #fff;
    border-radius: var(--radius); padding: 13px;
    font-weight: 700; font-size: .95rem;
    transition: background .15s;
  }
  .btn-wa:hover { background: #1ebe5d; }
  .btn-wa svg { width: 20px; height: 20px; fill: currentColor; }

  .btn-wave {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--accent2); color: var(--ink);
    border-radius: var(--radius); padding: 13px;
    font-weight: 700; font-size: .95rem;
    transition: background .15s;
  }
  .btn-wave:hover { background: #f59e0b; }

  .btn-clear {
    text-align: center; font-size: .8rem; color: var(--muted);
    padding: 4px; transition: color .12s;
  }
  .btn-clear:hover { color: var(--accent); }

  /* ─── Modal commande passée ───────────────────────────────── */
  #order-modal {
    position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,0,.5);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  #order-modal.open { opacity: 1; pointer-events: all; }
  .modal-box {
    background: var(--card); border-radius: 20px;
    padding: 32px 28px; max-width: 380px; width: 100%;
    display: flex; flex-direction: column; gap: 14px;
    align-items: center; text-align: center;
    animation: pop .25s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes pop { from { transform: scale(.85); } to { transform: scale(1); } }
  .modal-icon { font-size: 3rem; }
  .modal-title { font-family: var(--font-display); font-size: 1.3rem; font-weight: 800; }
  .modal-body { font-size: .9rem; color: var(--muted); line-height: 1.5; }
  #close-modal {
    background: var(--ink); color: #fff;
    border-radius: 999px; padding: 10px 28px;
    font-weight: 600; font-size: .9rem;
    transition: background .15s;
  }
  #close-modal:hover { background: var(--accent); }

  /* ─── Toast ───────────────────────────────────────────────── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--ink); color: #fff;
    border-radius: 999px; padding: 10px 20px;
    font-size: .85rem; font-weight: 600;
    opacity: 0; transition: opacity .2s, transform .2s;
    pointer-events: none; z-index: 400; white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ─── Admin link ──────────────────────────────────────────── */
  .admin-link {
    position: fixed; bottom: 14px; right: 16px;
    font-size: .7rem; color: var(--border);
    transition: color .2s; z-index: 10;
  }
  .admin-link:hover { color: var(--muted); }

  /* ─── Responsive ──────────────────────────────────────────── */
  @media (max-width: 480px) {
    .hero { padding: 36px 16px 24px; }
    .toolbar { padding: 0 16px; }
    .products-section { padding: 0 16px 80px; }
    #products-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
    .card-name { font-size: .9rem; }
  }
</style>
</head>
<body>

<!-- ═══ HEADER ═══════════════════════════════════════════════ -->
<header>
  <div class="logo">BD<span>.</span>Boutique</div>
  <div class="header-right">
    <button id="cart-btn" onclick="openCart()" aria-label="Voir le panier">
      🛒 Panier
      <span id="cart-count" class="hidden">0</span>
    </button>
  </div>
</header>

<!-- ═══ HERO ══════════════════════════════════════════════════ -->
<section class="hero">
  <p class="hero-eyebrow">Boutique en ligne</p>
  <h1 class="hero-title">Des produits<br>sélectionnés pour vous.</h1>
  <p class="hero-sub">Commandez facilement, payez par Wave ou via WhatsApp. Livraison rapide.</p>
</section>

<!-- ═══ TOOLBAR ═══════════════════════════════════════════════ -->
<div class="toolbar">
  <input id="search-input" type="search" placeholder="Rechercher un produit…" oninput="filterProducts()" aria-label="Rechercher">
  <select id="cat-filter" onchange="filterProducts()" aria-label="Filtrer par catégorie">
    <option value="">Toutes les catégories</option>
  </select>
</div>

<!-- ═══ GRILLE PRODUITS ═══════════════════════════════════════ -->
<section class="products-section">
  <div id="products-grid">
    <div style="grid-column:1/-1">
      <div class="state-msg">
        <div class="spinner"></div>
        <span>Chargement des produits…</span>
      </div>
    </div>
  </div>
</section>

<!-- ═══ PANIER (drawer) ═══════════════════════════════════════ -->
<div id="cart-overlay" onclick="closeCart()"></div>
<aside id="cart-drawer" role="dialog" aria-label="Panier">
  <div class="drawer-header">
    <h2>🛒 Mon panier</h2>
    <button id="close-cart" onclick="closeCart()" aria-label="Fermer">✕</button>
  </div>
  <div id="cart-items"></div>
  <div class="drawer-footer" id="drawer-footer" style="display:none">
    <div class="total-row">
      <span class="total-label">Total</span>
      <span class="total-amount" id="total-display">0 FCFA</span>
    </div>
    <button class="btn-wa" onclick="orderViaWhatsapp()">
      <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Commander via WhatsApp
    </button>
    <button class="btn-wave" onclick="orderViaWave()">
      💛 Payer avec Wave
    </button>
    <button class="btn-clear" onclick="clearCart()">Vider le panier</button>
  </div>
</aside>

<!-- ═══ MODAL CONFIRMATION ════════════════════════════════════ -->
<div id="order-modal">
  <div class="modal-box">
    <div class="modal-icon" id="modal-icon">✅</div>
    <p class="modal-title" id="modal-title">Commande envoyée !</p>
    <p class="modal-body" id="modal-body"></p>
    <button id="close-modal" onclick="closeModal()">OK, super !</button>
  </div>
</div>

<!-- ═══ TOAST ═════════════════════════════════════════════════ -->
<div id="toast"></div>

<!-- ═══ LIEN ADMIN ════════════════════════════════════════════ -->
<a href="boutique.html" class="admin-link">Admin</a>

<!-- ═══ JAVASCRIPT ════════════════════════════════════════════ -->
<script>
/* ── Config ────────────────────────────────────────────────── */
const WA_NUMBER = '2250769087461';
const WAVE_NUMBER = '0769087461';
const API = '/api';

/* ── État global ───────────────────────────────────────────── */
let allProducts = [];
let cart = JSON.parse(localStorage.getItem('bdb_cart') || '[]');

/* ── Utils ─────────────────────────────────────────────────── */
function fmt(n) {
  return Number(n).toLocaleString('fr-FR') + ' FCFA';
}
function saveCart() {
  localStorage.setItem('bdb_cart', JSON.stringify(cart));
  updateCartBadge();
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
function updateCartBadge() {
  const total = cart.reduce((s, i) => s + i.qty, 0);
  const badge = document.getElementById('cart-count');
  if (total > 0) {
    badge.textContent = total;
    badge.classList.remove('hidden');
  } else {
    badge.classList.add('hidden');
  }
}

/* ── Chargement produits ────────────────────────────────────── */
async function loadProducts() {
  try {
    const r = await fetch(`${API}/produits`);
    if (!r.ok) throw new Error('Erreur réseau');
    const data = await r.json();
    allProducts = Array.isArray(data) ? data : (data.produits || []);
    buildCategoryFilter();
    renderProducts(allProducts);
  } catch(e) {
    document.getElementById('products-grid').innerHTML = `
      <div style="grid-column:1/-1">
        <div class="state-msg">
          <div class="icon">😕</div>
          <strong>Impossible de charger les produits</strong>
          <span style="font-size:.82rem">Vérifiez que le serveur est démarré.<br><button onclick="loadProducts()" style="color:var(--accent);font-weight:600;cursor:pointer;background:none;border:none;font-size:.82rem;margin-top:4px">Réessayer</button></span>
        </div>
      </div>`;
  }
}

function buildCategoryFilter() {
  const cats = [...new Set(allProducts.map(p => p.categorie).filter(Boolean))];
  const sel = document.getElementById('cat-filter');
  cats.forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    sel.appendChild(o);
  });
}

function filterProducts() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const cat = document.getElementById('cat-filter').value;
  const filtered = allProducts.filter(p => {
    const matchQ = !q || (p.nom || '').toLowerCase().includes(q) || (p.description || '').toLowerCase().includes(q);
    const matchC = !cat || p.categorie === cat;
    return matchQ && matchC;
  });
  renderProducts(filtered);
}

function renderProducts(products) {
  const grid = document.getElementById('products-grid');
  if (!products.length) {
    grid.innerHTML = `
      <div style="grid-column:1/-1">
        <div class="state-msg">
          <div class="icon">🔍</div>
          <strong>Aucun produit trouvé</strong>
          <span style="font-size:.82rem">Essayez un autre mot-clé ou catégorie.</span>
        </div>
      </div>`;
    return;
  }
  grid.innerHTML = products.map(p => cardHTML(p)).join('');
}

function stockBadge(stock) {
  if (stock === null || stock === undefined) return '';
  if (stock === 0) return '<span class="stock-badge stock-out">Rupture</span>';
  if (stock <= 5) return `<span class="stock-badge stock-low">${stock} restants</span>`;
  return '<span class="stock-badge stock-ok">En stock</span>';
}

function cardHTML(p) {
  const imgTag = p.image_url
    ? `<img class="card-img" src="${p.image_url}" alt="${p.nom || ''}" loading="lazy" onerror="this.outerHTML='<div class=\\'card-img-placeholder\\'>🛍️</div>'">`
    : `<div class="card-img-placeholder">🛍️</div>`;

  const outOfStock = (p.stock !== null && p.stock !== undefined && p.stock === 0);
  return `
  <article class="card">
    ${imgTag}
    <div class="card-body">
      ${p.categorie ? `<p class="card-cat">${p.categorie}</p>` : ''}
      <h2 class="card-name">${p.nom || 'Produit'}</h2>
      ${p.description ? `<p class="card-desc">${p.description}</p>` : ''}
      ${stockBadge(p.stock)}
      <div class="card-footer">
        <div class="card-price">${fmt(p.prix)} <small>/ unité</small></div>
        <button class="btn-add" onclick="addToCart(${p.id})" ${outOfStock ? 'disabled' : ''}>
          ${outOfStock ? 'Indisponible' : '+ Ajouter'}
        </button>
      </div>
    </div>
  </article>`;
}

/* ── Panier ─────────────────────────────────────────────────── */
function addToCart(id) {
  const p = allProducts.find(x => x.id === id);
  if (!p) return;
  const line = cart.find(x => x.id === id);
  if (line) { line.qty++; }
  else { cart.push({ id: p.id, nom: p.nom, prix: p.prix, image_url: p.image_url || '', qty: 1 }); }
  saveCart();
  toast(`"${p.nom}" ajouté au panier`);
}

function removeFromCart(id) {
  cart = cart.filter(x => x.id !== id);
  saveCart();
  renderCart();
}

function changeQty(id, delta) {
  const line = cart.find(x => x.id === id);
  if (!line) return;
  line.qty += delta;
  if (line.qty <= 0) cart = cart.filter(x => x.id !== id);
  saveCart();
  renderCart();
}

function clearCart() {
  if (!cart.length) return;
  if (!confirm('Vider le panier ?')) return;
  cart = [];
  saveCart();
  renderCart();
}

function openCart()  {
  renderCart();
  document.getElementById('cart-overlay').classList.add('open');
  document.getElementById('cart-drawer').classList.add('open');
}
function closeCart() {
  document.getElementById('cart-overlay').classList.remove('open');
  document.getElementById('cart-drawer').classList.remove('open');
}

function renderCart() {
  const container = document.getElementById('cart-items');
  const footer    = document.getElementById('drawer-footer');
  if (!cart.length) {
    container.innerHTML = `
      <div class="cart-empty-msg">
        <div class="icon">🛒</div>
        <strong>Votre panier est vide</strong>
        <span style="font-size:.82rem">Ajoutez des produits depuis la boutique.</span>
      </div>`;
    footer.style.display = 'none';
    return;
  }
  const total = cart.reduce((s, i) => s + i.prix * i.qty, 0);
  container.innerHTML = cart.map(line => {
    const img = line.image_url
      ? `<img class="cart-line-img" src="${line.image_url}" alt="${line.nom}" loading="lazy" onerror="this.outerHTML='<div class=\\'cart-line-img-ph\\'>🛍️</div>'">`
      : `<div class="cart-line-img-ph">🛍️</div>`;
    return `
    <div class="cart-line">
      ${img}
      <div class="cart-line-info">
        <p class="cart-line-name">${line.nom}</p>
        <p class="cart-line-price">${fmt(line.prix)}</p>
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="changeQty(${line.id},-1)" aria-label="Retirer un">−</button>
        <span class="qty-val">${line.qty}</span>
        <button class="qty-btn" onclick="changeQty(${line.id},1)" aria-label="Ajouter un">+</button>
      </div>
      <span class="cart-line-total">${fmt(line.prix * line.qty)}</span>
    </div>`;
  }).join('');
  document.getElementById('total-display').textContent = fmt(total);
  footer.style.display = 'flex';
}

/* ── Commander ──────────────────────────────────────────────── */
async function createOrderBackend(moyenPaiement) {
  try {
    const lignes = cart.map(i => ({ produit_id: i.id, quantite: i.qty, prix_unitaire: i.prix }));
    const r = await fetch(`${API}/commandes`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ lignes, moyen_paiement: moyenPaiement })
    });
    return r.ok ? await r.json() : null;
  } catch { return null; }
}

async function orderViaWhatsapp() {
  if (!cart.length) return;
  const result = await createOrderBackend('whatsapp');
  const lines  = cart.map(i => `• ${i.nom} ×${i.qty} — ${fmt(i.prix * i.qty)}`).join('\n');
  const total  = cart.reduce((s,i) => s + i.prix * i.qty, 0);
  const refText = result?.id ? `\n\nRéférence commande : #${result.id}` : '';
  const msg = encodeURIComponent(
    `Bonjour ! Je souhaite passer une commande sur BD Boutique :\n\n${lines}\n\n*Total : ${fmt(total)}*${refText}\n\nMerci !`
  );
  closeCart();
  cart = []; saveCart();
  showModal('✅', 'Commande envoyée !',
    `Vous allez être redirigé vers WhatsApp pour finaliser votre commande. Le vendeur vous répondra sous peu.`);
  setTimeout(() => {
    window.open(`https://wa.me/${WA_NUMBER}?text=${msg}`, '_blank');
  }, 600);
}

async function orderViaWave() {
  if (!cart.length) return;
  const result = await createOrderBackend('wave');
  const total  = cart.reduce((s,i) => s + i.prix * i.qty, 0);
  const refText = result?.id ? `#${result.id}` : '';
  closeCart();
  cart = []; saveCart();
  showModal('💛', 'Paiement Wave',
    `Envoyez ${fmt(total)} au numéro Wave <strong>${WAVE_NUMBER}</strong> et précisez la référence <strong>${refText || 'votre commande'}</strong> en commentaire. Le vendeur validera votre commande dès réception.`);
}

/* ── Modal ──────────────────────────────────────────────────── */
function showModal(icon, title, body) {
  document.getElementById('modal-icon').textContent  = icon;
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML    = body;
  document.getElementById('order-modal').classList.add('open');
}
function closeModal() {
  document.getElementById('order-modal').classList.remove('open');
}

/* ── Keyboard ───────────────────────────────────────────────── */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeCart(); closeModal(); }
});

/* ── Init ───────────────────────────────────────────────────── */
updateCartBadge();
loadProducts();
</script>
</body>
